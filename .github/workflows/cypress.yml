name: Cypress Quality Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gates:
    name: Validar qualidade estática
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar vulnerabilidades críticas
        run: npm audit --audit-level=high

      - name: Validar formatação
        run: npm run format:check

      - name: Validar qualidade estática
        run: npm run lint

  cypress-tests:
    name: Executar testes Cypress - ${{ matrix.test-group.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: quality-gates

    strategy:
      fail-fast: false
      matrix:
        test-group:
          - name: API
            command: npm run cy:run:api
            artifact-name: evidencias-cypress-api
          - name: Frontend
            command: npm run cy:run:frontend
            artifact-name: evidencias-cypress-frontend

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes Cypress - ${{ matrix.test-group.name }}
        run: ${{ matrix.test-group.command }}

      - name: Publicar evidências da execução - ${{ matrix.test-group.name }}
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.test-group.artifact-name }}
          path: |
            cypress/videos
            cypress/screenshots
          if-no-files-found: ignore
