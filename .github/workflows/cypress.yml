name: Cypress Quality Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cypress-run:
    name: Executar testes automatizados
    runs-on: ubuntu-24.04

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar formatação
        run: npm run format:check

      - name: Validar qualidade estática
        run: npm run lint

      - name: Executar testes Cypress
        run: npm run cy:run

      - name: Publicar evidências da execução
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-evidences
          path: |
            cypress/videos
            cypress/screenshots
          if-no-files-found: ignore
